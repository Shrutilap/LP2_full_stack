<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula | Premium Blog Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav>
        <div class="container nav-content">
            <h1 class="logo">Nebula<span>.</span></h1>
            <button id="create-post-btn" class="btn-primary">Create Post</button>
        </div>
    </nav>

    <main class="container">
        <header class="hero">
            <h2>Explore the <span>Infinite</span> Stories</h2>
            <p>A space for modern thoughts, curated for the tech-savvy mind.</p>
        </header>

        <section id="blog-grid" class="blog-grid">
            <!-- Posts will be injected here -->
            <div class="loader">Loading stories...</div>
        </section>
    </main>

    <!-- Modal for Create/Edit -->
    <div id="modal" class="modal">
        <div class="modal-content glass">
            <span class="close-btn">&times;</span>
            <h3 id="modal-title">Create New Story</h3>
            <form id="post-form">
                <input type="hidden" id="post-id">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" required placeholder="Enter a catchy title...">
                </div>
                <div class="form-group">
                    <label for="author">Author</label>
                    <input type="text" id="author" required placeholder="Your name...">
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category">
                        <option value="Technology">Technology</option>
                        <option value="Design">Design</option>
                        <option value="Cloud">Cloud</option>
                        <option value="Lifestyle">Lifestyle</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="imageUrl">Image URL</label>
                    <input type="url" id="imageUrl" placeholder="https://images.unsplash.com/...">
                </div>
                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea id="content" required placeholder="Write your story here..." rows="6"></textarea>
                </div>
                <button type="submit" class="btn-submit">Publish Story</button>
            </form>
        </div>
    </div>

    <!-- Read Modal -->
    <div id="read-modal" class="modal">
        <div class="modal-content glass read-modal-content">
            <span class="close-btn" id="close-read-modal">&times;</span>
            <img id="read-image" src="" alt="" class="read-modal-image">
            <h3 id="read-title"></h3>
            <div class="read-modal-meta">
                <span id="read-author"></span> • <span id="read-date"></span>
            </div>
            <div id="read-body" class="read-modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
