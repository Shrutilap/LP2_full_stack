<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack | Student Records Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-bg"></div>
    
    <nav>
        <div class="container nav-content">
            <h1 class="logo">Edu<span>Track</span></h1>
            <button id="add-student-btn" class="btn-primary">+ Add Student</button>
        </div>
    </nav>

    <main class="container">
        <header class="dashboard-header">
            <div class="header-text">
                <h2>Student Registry</h2>
                <p>Manage and track academic records with ease.</p>
            </div>
            <div class="stats-cards">
                <div class="stat-card glass">
                    <span class="stat-label">Total Students</span>
                    <span id="count-total" class="stat-value">0</span>
                </div>
                <div class="stat-card glass">
                    <span class="stat-label">Average GPA</span>
                    <span id="avg-gpa" class="stat-value">0.0</span>
                </div>
            </div>
        </header>

        <div class="table-wrapper glass">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Roll Number</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>GPA</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="student-table-body">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal for Add/Edit -->
    <div id="modal" class="modal">
        <div class="modal-content glass">
            <span class="close-btn">&times;</span>
            <h3 id="modal-title">Add New Student</h3>
            <form id="student-form">
                <input type="hidden" id="student-id">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required placeholder="e.g. John Doe">
                    </div>
                    <div class="form-group">
                        <label for="rollNo">Roll Number</label>
                        <input type="text" id="rollNo" required placeholder="e.g. CS101">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="john@university.edu">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="department">Department</label>
                            <input type="text" id="department" required placeholder="e.g. CS">
                        </div>
                        <div class="form-group">
                            <label for="gpa">Current GPA</label>
                            <input type="number" id="gpa" step="0.01" min="0" max="10" required placeholder="0.00">
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Save Student Record</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
